name: Deploy GCP production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-kore-gcp
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: premedica-prod-2025
  GCP_RUN_REGION: europe-west9
  KORE_PUBLIC_SITE_URL: https://kore.ll-it-sc.be
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/237481297060/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_SERVICE_ACCOUNT: github-kore-deploy@premedica-prod-2025.iam.gserviceaccount.com

jobs:
  quality:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Cloud Build → Kore API + frontend
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy (Cloud Build)
        run: |
          chmod +x infra/gcp/*.sh infra/gcp/lib/*.sh 2>/dev/null || true
          gcloud builds submit \
            --config=infra/gcp/cloudbuild.yaml \
            --project="${GCP_PROJECT_ID}"

      - name: Postdeploy (migrate + seed + smoke)
        run: |
          bash infra/gcp/postdeploy.sh

      - name: Summary
        run: |
          API_URL="$(gcloud run services describe kore-api \
            --region="${GCP_RUN_REGION}" --project="${GCP_PROJECT_ID}" \
            --format='value(status.url)' 2>/dev/null || true)"
          FE_URL="$(gcloud run services describe kore-frontend \
            --region="${GCP_RUN_REGION}" --project="${GCP_PROJECT_ID}" \
            --format='value(status.url)' 2>/dev/null || true)"
          {
            echo "### Kore GCP"
            echo ""
            echo "| Service | URL |"
            echo "|---------|-----|"
            echo "| Site (custom) | ${KORE_PUBLIC_SITE_URL} |"
            echo "| API Cloud Run | ${API_URL} |"
            echo "| Frontend Cloud Run | ${FE_URL} |"
          } >> "${GITHUB_STEP_SUMMARY}"
