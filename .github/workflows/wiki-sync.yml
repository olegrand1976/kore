name: Sync GitHub Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync documentation to project wiki
        env:
          WIKI_SYNC_TOKEN: ${{ secrets.WIKI_SYNC_TOKEN }}
          WIKI_GIT_URL: https://github.com/${{ github.repository }}.wiki.git
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/sync-github-wiki.sh

      - name: Summary
        run: |
          {
            echo "### GitHub Wiki"
            echo ""
            echo "Documentation synchronisée : [Wiki du projet](https://github.com/${{ github.repository }}/wiki)"
          } >> "${GITHUB_STEP_SUMMARY}"
