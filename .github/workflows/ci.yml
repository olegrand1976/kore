name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Go test
        run: go test ./...
      - name: Coverage gate (domain/app)
        run: bash scripts/check-coverage.sh
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Integration tests (testcontainers)
        run: make test-integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  smoke:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Start test stack
        run: |
          docker compose -f deploy/docker-compose.test.yml up -d
          sleep 5
      - name: Migrate and seed
        env:
          DATABASE_URL: postgres://kore:kore@localhost:5433/kore_test?sslmode=disable
          REDIS_ADDR: localhost:6380
          HTTP_ADDR: ':8081'
          JWT_SIGNING_KEY: ci-test-key
          DEV_SEED_ENABLED: 'true'
          MIGRATE_ON_BOOT: 'true'
        run: |
          go run ./cmd/kore-api migrate
          go run ./cmd/kore-api seed &
          sleep 3
          go run ./cmd/kore-api &
          sleep 5
          bash scripts/smoke-test.sh
      - name: Stop test stack
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down
