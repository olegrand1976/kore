# Build images uniquement (legacy). Déploiement complet : infra/gcp/cloudbuild.yaml
#
#   make gcp-deploy
#   gcloud builds submit --config=infra/gcp/cloudbuild.yaml --project=premedica-prod-2025

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/Dockerfile.api
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/kore/kore-api:${SHORT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/Dockerfile.frontend
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/kore/kore-frontend:${SHORT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/kore/kore-api:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/kore/kore-frontend:${SHORT_SHA}

substitutions:
  _REGION: europe-west1

options:
  logging: CLOUD_LOGGING_ONLY
