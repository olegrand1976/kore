services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kore
      POSTGRES_PASSWORD: kore
      POSTGRES_DB: kore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kore -d kore"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6381:6379"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  stripe-mock:
    image: stripe/stripe-mock:latest
    ports:
      - "12111:12111"

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ["migrate"]
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
