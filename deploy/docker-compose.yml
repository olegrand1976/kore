services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kore
      POSTGRES_PASSWORD: kore
      POSTGRES_DB: kore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kore -d kore"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${KORE_DB_PORT:-5434}:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${KORE_REDIS_PORT:-6381}:6379"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "${KORE_MAILHOG_SMTP_PORT:-1025}:1025"
      - "${KORE_MAILHOG_UI_PORT:-8025}:8025"

  stripe-mock:
    image: stripe/stripe-mock:latest
    ports:
      - "${KORE_STRIPE_MOCK_PORT:-12111}:12111"

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ["migrate"]
    env_file:
      - ../.env
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ../.env
    ports:
      - "${KORE_API_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - kore_uploads:/data/uploads

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://api:8080
    ports:
      - "${KORE_FRONTEND_PORT:-3001}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  kore_uploads:
