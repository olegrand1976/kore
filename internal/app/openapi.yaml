  /missions:
    get:
      summary: Liste missions SSII
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
    post:
      summary: Créer mission
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Créé }
  /missions/{id}:
    get:
      summary: Détail mission
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
