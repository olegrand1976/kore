openapi: 3.1.0
info:
  title: Kore API
  version: 1.0.0
  description: API Kore — monolithe modulaire PSA/ESN
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
  /auth/login:
    post:
      summary: Authentification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Tokens émis
  /auth/refresh:
    post:
      summary: Renouvellement token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: Nouveaux tokens
  /auth/logout:
    post:
      summary: Déconnexion
      responses:
        "200":
          description: Session invalidée
  /societes:
    get:
      summary: Liste des sociétés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer une société
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /societes/{id}/branding:
    put:
      summary: Mettre à jour le branding tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Branding mis à jour
  /users:
    get:
      summary: Liste utilisateurs
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer un utilisateur
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /clients:
    get:
      summary: Liste clients
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer client
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /notification-rules:
    get:
      summary: Lister règles notifications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Définir règle notification
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /notifications:
    get:
      summary: Journal envois
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
  /workflows:
    post:
      summary: Définir workflow
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /workflows/{code}:
    get:
      summary: Détail workflow
      security: [{ bearerAuth: [] }]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Définition
  /workflow-instances/{id}:
    get:
      summary: Instance workflow
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Instance
  /workflow-instances/{id}/fire:
    post:
      summary: Déclencher transition
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Transition exécutée
  /timesheets/recent:
    get:
      summary: CRA récents
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
  /timesheets:
    get:
      summary: CRA du mois
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          schema: { type: string, example: "2026-07" }
      responses:
        "200":
          description: Feuille de temps
  /timesheets/{id}:
    get:
      summary: Détail CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Feuille de temps
  /timesheets/{id}/weeks/{week}:
    put:
      summary: Enregistrer semaine CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: week
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Semaine enregistrée
  /timesheets/{id}/weeks/{week}/submit:
    post:
      summary: Soumettre semaine CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: week
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Semaine soumise
  /timesheets/{id}/commercial-info:
    put:
      summary: Infos commerciales CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Infos enregistrées
  /timesheets/{id}/pdf:
    post:
      summary: Générer PDF CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Document généré
  /timesheets/{id}/validate:
    post:
      summary: Validation définitive CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: CRA validé
  /leave-requests:
    get:
      summary: Liste congés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Demande congé
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /leave-balances:
    get:
      summary: Soldes congés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Soldes
  /budgets:
    get:
      summary: Liste budgets
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer budget
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /budgets/{id}:
    get:
      summary: Détail budget
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Budget
  /budgets/{id}/recompute:
    post:
      summary: Recalcul consommation budget
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Consommation recalculée
  /budgets/{id}/approve:
    post:
      summary: Valider consommation budget
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Consommation approuvée
  /demands:
    get:
      summary: Liste demandes TMA
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer demande TMA
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /billing/checkout-session:
    post:
      summary: Session Stripe Checkout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: URL Checkout
  /billing/portal-session:
    post:
      summary: Portail client Stripe
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: URL portail
  /billing/subscription:
    get:
      summary: Abonnement courant
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Abonnement
  /billing/cancel:
    post:
      summary: Annuler abonnement
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Annulé
  /webhooks/stripe:
    post:
      summary: Webhook Stripe
      responses:
        "200":
          description: Traité
  /public/pricing:
    get:
      summary: Grille tarifaire publique
      responses:
        "200":
          description: Tarifs
  /public/modules:
    get:
      summary: Modules disponibles
      responses:
        "200":
          description: Modules
  /public/leads:
    post:
      summary: Capture lead
      responses:
        "201":
          description: Lead enregistré
  /public/booking/slots:
    get:
      summary: Créneaux disponibles
      responses:
        "200":
          description: Créneaux
  /public/booking/appointments:
    post:
      summary: Réserver entretien
      responses:
        "201":
          description: Réservation confirmée
  /public/booking/appointments/{token}/cancel:
    post:
      summary: Annuler un entretien
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Annulé
  /public/booking/appointments/{token}/reschedule:
    post:
      summary: Reprogrammer un entretien
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Reprogrammé
  /sites:
    post:
      summary: Créer un site
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Site créé
  /services:
    post:
      summary: Créer un service
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Service créé
  /applications:
    post:
      summary: Créer une application
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Application créée
  /branding/logo/{tenantId}:
    get:
      summary: Logo du tenant
      parameters:
        - { name: tenantId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Logo
  /workflow-instances/{id}/actions:
    get:
      summary: Actions disponibles pour une instance
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Actions
  /leave-requests/{id}/approve:
    post:
      summary: Approuver une demande de congé
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Approuvée
  /leave-requests/{id}/reject:
    post:
      summary: Refuser une demande de congé
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Refusée
  /budgets/{id}/estimates:
    post:
      summary: Ajouter un chiffrage au budget
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "201":
          description: Chiffrage ajouté
  /budgets/{id}/quotes:
    post:
      summary: Ajouter un devis au budget
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "201":
          description: Devis ajouté
  /demands/export.xml:
    get:
      summary: Export XML des demandes TMA
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Export XML
  /demands/{id}/analysis:
    post:
      summary: Enregistrer l'analyse d'une demande
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Analyse enregistrée
  /demands/{id}/assign:
    post:
      summary: Affecter une demande
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Affectée
  /demands/{id}/take-over:
    post:
      summary: Prendre en charge une demande
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Prise en charge
  /demands/{id}/resolve:
    post:
      summary: Résoudre une demande
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Résolue
  /demands/{id}/reopen:
    post:
      summary: Rouvrir une demande
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Rouverte
  /demands/{id}/validate-creation:
    post:
      summary: Valider la création d'une demande
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Création validée
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
