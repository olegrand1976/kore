components:
  schemas:
    CRAError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - CRA_ALREADY_VALIDATED
                - COMMERCIAL_INFO_REQUIRED
                - DAY_CAPACITY_EXCEEDED
                - CRA_CONFLICT_ABSENCE
                - WEEK_INCOMPLETE
            message:
              type: string
    GanttView:
      type: object
      properties:
        period:
          $ref: '#/components/schemas/ReportingPeriod'
        items:
          type: array
          items:
            $ref: '#/components/schemas/GanttItem'
    GanttItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        progress: { type: number, format: float }
    PlanningView:
      type: object
      properties:
        period:
          $ref: '#/components/schemas/ReportingPeriod'
        rows:
          type: array
          items:
            $ref: '#/components/schemas/PlanningRow'
    PlanningRow:
      type: object
      properties:
        userId: { type: string, format: uuid }
        userName: { type: string }
        slots:
          type: array
          items:
            $ref: '#/components/schemas/PlanningSlot'
    PlanningSlot:
      type: object
      properties:
        date: { type: string, format: date }
        label: { type: string }
        hours: { type: number, format: float }
    BillingStats:
      type: object
      properties:
        period:
          $ref: '#/components/schemas/ReportingPeriod'
        totalAmount: { type: integer, format: int64 }
        invoiceCount: { type: integer }
        currency: { type: string }
        billableHours: { type: number, format: float }
    ReportingPeriod:
      type: object
      properties:
        start: { type: string, format: date }
        end: { type: string, format: date }
    InvoiceDraftResult:
      type: object
      properties:
        status:
          type: string
          enum: [created, skipped, unavailable]
        reason: { type: string }
        invoiceId: { type: string, format: uuid }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
