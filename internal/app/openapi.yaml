        "200": { description: OK }
    post:
      summary: Ajouter entrée annuaire
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Créé }
  /gantt:
    get:
      summary: Données Gantt
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
  /planning:
    get:
