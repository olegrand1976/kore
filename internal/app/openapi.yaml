      summary: Révoquer clé API
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200": { description: OK }
  /invoices:
    get:
      summary: Liste factures
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
    post:
      summary: Créer facture
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Créé }
  /invoices/{id}:
