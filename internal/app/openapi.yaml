      summary: Valider la création d'une demande
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Création validée
  /integrations/connections:
    get:
      summary: Liste connexions intégration
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
    post:
      summary: Créer connexion intégration
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Créé }
  /integrations/connections/{id}:
    get:
      summary: Détail connexion
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200": { description: OK }
    delete:
      summary: Supprimer connexion
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200": { description: OK }
  /integrations/connections/{id}/sync:
    post:
      summary: Synchroniser connexion
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200": { description: OK }
  /integrations/api-keys:
    get:
      summary: Liste clés API
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
    post:
      summary: Créer clé API
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Créé }
  /integrations/api-keys/{id}:
