openapi: 3.1.0
info:
  title: Kore API
  version: 1.0.0
  description: API Kore — monolithe modulaire PSA/ESN
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
  /auth/login:
    post:
      summary: Authentification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Tokens émis
  /auth/refresh:
    post:
      summary: Renouvellement token
      responses:
        "200":
          description: Nouveaux tokens
  /auth/logout:
    post:
      summary: Déconnexion
      responses:
        "200":
          description: Session invalidée
  /societes:
    get:
      summary: Liste des sociétés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer une société
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /users:
    post:
      summary: Créer un utilisateur
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /clients:
    get:
      summary: Liste clients
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer client
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /notification-rules:
    get:
      summary: Lister règles notifications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Définir règle notification
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /notifications:
    get:
      summary: Journal envois
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
  /workflows:
    post:
      summary: Définir workflow
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /workflows/{code}:
    get:
      summary: Détail workflow
      security: [{ bearerAuth: [] }]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Définition
  /workflow-instances/{id}:
    get:
      summary: Instance workflow
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Instance
  /workflow-instances/{id}/fire:
    post:
      summary: Déclencher transition
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Transition exécutée
  /timesheets:
    get:
      summary: CRA du mois
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          schema: { type: string, example: "2026-07" }
      responses:
        "200":
          description: Feuille de temps
  /leave-requests:
    get:
      summary: Liste congés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Demande congé
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /budgets:
    get:
      summary: Liste budgets
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer budget
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /demands:
    get:
      summary: Liste demandes TMA
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer demande TMA
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /billing/checkout-session:
    post:
      summary: Session Stripe Checkout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: URL Checkout
  /billing/subscription:
    get:
      summary: Abonnement courant
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Abonnement
  /webhooks/stripe:
    post:
      summary: Webhook Stripe
      responses:
        "200":
          description: Traité
  /public/pricing:
    get:
      summary: Grille tarifaire publique
      responses:
        "200":
          description: Tarifs
  /public/modules:
    get:
      summary: Modules disponibles
      responses:
        "200":
          description: Modules
  /public/leads:
    post:
      summary: Capture lead
      responses:
        "201":
          description: Lead enregistré
  /public/booking/slots:
    get:
      summary: Créneaux disponibles
      responses:
        "200":
          description: Créneaux
  /public/booking/appointments:
    post:
      summary: Réserver entretien
      responses:
        "201":
          description: Réservation confirmée
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
