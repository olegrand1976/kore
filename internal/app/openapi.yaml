openapi: 3.1.0
info:
  title: Kore API
  version: 1.0.0
  description: API Kore — monolithe modulaire PSA/ESN
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
  /auth/login:
    post:
      summary: Authentification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Tokens émis
  /auth/refresh:
    post:
      summary: Renouvellement token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: Nouveaux tokens
  /auth/logout:
    post:
      summary: Déconnexion
      responses:
        "200":
          description: Session invalidée
  /auth/2fa/verify:
    post:
      summary: Valider un challenge 2FA TOTP après login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeToken, code]
              properties:
                challengeToken: { type: string }
                code: { type: string }
      responses:
        "200":
          description: Tokens émis
  /auth/2fa/enrollment/setup:
    post:
      summary: Démarrer l'enrôlement 2FA (token post-login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollmentToken]
              properties:
                enrollmentToken: { type: string }
      responses:
        "200":
          description: Secret TOTP et QR code
  /auth/2fa/enrollment/confirm:
    post:
      summary: Confirmer l'enrôlement 2FA (token post-login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollmentToken, code]
              properties:
                enrollmentToken: { type: string }
                code: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Tokens émis
  /societes:
    get:
      summary: Liste des sociétés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer une société
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /societes/{id}/branding:
    put:
      summary: Mettre à jour le branding tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Branding mis à jour
  /societes/{id}/settings:
    put:
      summary: Paramètres CRA société
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                weekStartDay: { type: integer, minimum: 0, maximum: 6 }
                dayCapacityMinutes: { type: integer, minimum: 1, maximum: 1440 }
                craMailAuto: { type: boolean }
                weekSubmitPolicy: { type: string, enum: [block, warn, none] }
                craGateMode: { type: string, enum: [block, warn] }
                craMailRecipients: { type: array, items: { type: string } }
                taskTypesEnabled: { type: array, items: { type: string } }
      responses:
        "200":
          description: Paramètres mis à jour
  /users:
    get:
      summary: Liste utilisateurs
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer un utilisateur
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /users/{id}:
    get:
      summary: Détail utilisateur
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Détail
    put:
      summary: Mettre à jour un utilisateur
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Mis à jour
    delete:
      summary: Supprimer un utilisateur (soft delete)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Supprimé
  /users/{id}/deactivate:
    patch:
      summary: Désactiver un utilisateur
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Désactivé
  /users/me/release-notes:
    get:
      summary: Préférences release notes (utilisateur courant)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Préférences
  /users/me/profile:
    get:
      summary: Profil utilisateur courant (craRequis, salarieEtt)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Profil
  /users/me/2fa:
    get:
      summary: Statut 2FA TOTP (utilisateur courant)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Statut 2FA
  /users/me/2fa/setup:
    post:
      summary: Démarrer l'activation 2FA (utilisateur courant)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Secret TOTP et QR code
  /users/me/2fa/confirm:
    post:
      summary: Confirmer l'activation 2FA (utilisateur courant)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Codes de secours
  /users/me/2fa/disable:
    post:
      summary: Désactiver le 2FA (utilisateur courant)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, code]
              properties:
                password: { type: string }
                code: { type: string }
      responses:
        "200":
          description: 2FA désactivé
  /users/me/calendar-settings:
    get:
      summary: Paramètres calendrier CRA (utilisateur courant)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: weekStartDay, dayCapacityMinutes, weekSubmitPolicy, craGateMode
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      weekStartDay: { type: integer }
                      dayCapacityMinutes: { type: integer }
                      weekSubmitPolicy: { type: string, enum: [block, warn, none] }
                      craGateMode: { type: string, enum: [block, warn] }
  /users/me/release-notes/auto-show:
    post:
      summary: Activer/désactiver l'affichage auto des release notes (utilisateur courant)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: OK
  /users/me/release-notes/seen:
    post:
      summary: Marquer une version comme vue (release notes)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: string }
      responses:
        "200":
          description: OK
  /auth/oidc/authorize:
    get:
      summary: URL de redirection OIDC SSO
      parameters:
        - name: tenant
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: redirect_uri
          in: query
          required: true
          schema: { type: string }
        - name: code_challenge
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: URL authorize
  /auth/oidc/status:
    get:
      summary: Statut SSO OIDC pour un tenant
      parameters:
        - name: tenant
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Capacité SSO du tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      enabled: { type: boolean }
                      providerName: { type: string }
        "400":
          description: Tenant invalide
  /auth/oidc/callback:
    post:
      summary: Callback OIDC → JWT Kore
      responses:
        "200":
          description: Tokens émis
  /auth/tenant-discovery/request:
    post:
      summary: Demander un lien pour retrouver son organisation (tenant)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        "200":
          description: OK
  /auth/tenant-discovery/resolve:
    get:
      summary: Résoudre un token discovery → tenantId
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Résolu
        "401":
          description: Token invalide/expiré/utilisé
  /public/invitations/resolve:
    get:
      summary: Résoudre un token d’invitation → tenantId
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Résolu
        "401":
          description: Token invalide/expiré/utilisé
  /admin/invitations:
    post:
      summary: Envoyer une invitation (lien de connexion) par email
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        "200":
          description: OK
  /admin/identity-providers:
    get:
      summary: Liste IdP du tenant
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
  /admin/identity-providers/{id}:
    put:
      summary: Configurer IdP OIDC
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Configuré
  /clients:
    get:
      summary: Liste clients
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer client
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /clients/{id}:
    get:
      summary: Détail client
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Détail
  /notification-rules:
    get:
      summary: Lister règles notifications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Définir règle notification
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /notifications:
    get:
      summary: Journal envois
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
  /workflows:
    post:
      summary: Définir workflow
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /workflows/{code}:
    get:
      summary: Détail workflow
      security: [{ bearerAuth: [] }]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Définition
  /workflow-instances/{id}:
    get:
      summary: Instance workflow
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Instance
  /workflow-instances/{id}/fire:
    post:
      summary: Déclencher transition
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Transition exécutée
  /timesheets/recent:
    get:
      summary: CRA récents
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
  /timesheets:
    get:
      summary: CRA du mois
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          schema: { type: string, example: "2026-07" }
      responses:
        "200":
          description: Feuille de temps
  /timesheets/{id}:
    get:
      summary: Détail CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Feuille de temps
  /timesheets/{id}/weeks/{week}:
    put:
      summary: Enregistrer semaine CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: week
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Semaine enregistrée
  /timesheets/{id}/weeks/{week}/submit:
    post:
      summary: Soumettre semaine CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: week
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Semaine soumise
  /timesheets/{id}/commercial-info:
    put:
      summary: Infos commerciales CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Infos enregistrées
  /timesheets/{id}/pdf:
    post:
      summary: Générer PDF CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Document généré
  /timesheets/{id}/validate:
    post:
      summary: Validation définitive CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: CRA validé
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status: { type: string }
                      invoiceDraft:
                        $ref: '#/components/schemas/InvoiceDraftResult'
        "409":
          description: CRA déjà validé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRAError'
        "422":
          description: Erreur de validation CRA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRAError'
  /timesheets/{id}/reject:
    post:
      summary: Rejeter un CRA (manager)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: CRA rejeté
  /timesheets/{id}/prefill-holidays:
    post:
      summary: Préremplir jours fériés du mois
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: country
          in: query
          schema: { type: string, example: FR }
      responses:
        "200":
          description: Lignes ajoutées
  /timesheets/{id}/prefill-ett:
    post:
      summary: Préremplir CRA depuis les jours ETT du mois
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Lignes ajoutées
  /prestations:
    get:
      summary: Suivi prestations CRA (manager)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          required: true
          schema: { type: string, example: "2026-07" }
      responses:
        "200":
          description: Liste des CRA du mois
  /prestations/export.xml:
    get:
      summary: Export XML prestations CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          required: true
          schema: { type: string, example: "2026-07" }
      responses:
        "200":
          description: XML prestations
  /prestations/billable-summary:
    get:
      summary: Synthèse heures facturables CRA
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          required: true
          schema: { type: string, example: "2026-07" }
      responses:
        "200":
          description: Heures facturables par utilisateur
  /prestations/validate-all:
    post:
      summary: Valider tous les CRA soumis du mois
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [month]
              properties:
                month: { type: string, example: "2026-07" }
      responses:
        "200":
          description: Nombre de CRA validés
  /leave-requests:
    get:
      summary: Liste congés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Demande congé
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /leave-balances:
    get:
      summary: Soldes congés
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Soldes
  /leave-type-configs:
    get:
      summary: Catalogue types congés par société
      security: [{ bearerAuth: [] }]
      parameters:
        - name: societeId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Liste
    post:
      summary: Créer un type de congé
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /leave-type-configs/mine:
    get:
      summary: Types actifs pour la société de l'utilisateur
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
  /leave-type-configs/reset:
    post:
      summary: Recharger les défauts pays
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Catalogue mis à jour
  /leave-type-configs/{id}:
    put:
      summary: Modifier un type de congé
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Mis à jour
    delete:
      summary: Supprimer ou désactiver un type
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Supprimé
        "409":
          description: Type utilisé, désactivé
  /budgets:
    get:
      summary: Liste budgets
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer budget
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créé
  /budgets/{id}:
    get:
      summary: Détail budget
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Budget
  /budgets/{id}/recompute:
    post:
      summary: Recalcul consommation budget
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Consommation recalculée
  /budgets/{id}/approve:
    post:
      summary: Valider consommation budget
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Consommation approuvée
  /demands:
    get:
      summary: Liste demandes TMA
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer demande TMA
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Créée
  /billing/checkout-session:
    post:
      summary: Session Stripe Checkout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: URL Checkout
  /billing/portal-session:
    post:
      summary: Portail client Stripe
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: URL portail
  /billing/subscription:
    get:
      summary: Abonnement courant
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Abonnement
  /billing/cancel:
    post:
      summary: Annuler abonnement
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Annulé
  /webhooks/stripe:
    post:
      summary: Webhook Stripe
      responses:
        "200":
          description: Traité
  /webhooks/pdp:
    post:
      summary: Webhook PDP (statuts e-facturation)
      responses:
        "200":
          description: Traité
  /public/pricing:
    get:
      summary: Grille tarifaire publique
      responses:
        "200":
          description: Tarifs
  /public/modules:
    get:
      summary: Modules disponibles
      responses:
        "200":
          description: Modules
  /public/leads:
    post:
      summary: Capture lead
      responses:
        "201":
          description: Lead enregistré
  /public/booking/slots:
    get:
      summary: Créneaux disponibles
      responses:
        "200":
          description: Créneaux
  /public/booking/appointments:
    post:
      summary: Réserver entretien
      responses:
        "201":
          description: Réservation confirmée
  /public/booking/appointments/{token}/cancel:
    post:
      summary: Annuler un entretien
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Annulé
  /public/booking/appointments/{token}/reschedule:
    post:
      summary: Reprogrammer un entretien
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Reprogrammé
  /sites:
    post:
      summary: Créer un site
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Site créé
  /services:
    post:
      summary: Créer un service
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Service créé
  /applications:
    get:
      summary: Liste applications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Liste
    post:
      summary: Créer une application
